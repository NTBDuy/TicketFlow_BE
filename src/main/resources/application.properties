spring.application.name=ticketflow

spring.datasource.url=jdbc:postgresql://localhost:5433/ticketflow
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.access.secret=${JWT_ACCESS_SECRETKEY}
# 15 min
jwt.access.expiration=900000

jwt.refresh.secret=${JWT_REFRESH_SECRETKEY}
# 7 days
jwt.refresh.expiration=604800000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_USERNAME}

spring.data.redis.host=localhost
spring.data.redis.port=6380
